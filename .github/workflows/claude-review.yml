name: Claude AI Code Review

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  check-label:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ai-review'
    outputs:
      should-run: ${{ steps.size-check.outputs.should-run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR 크기 사전 확인
        id: size-check
        run: |
          DIFF_LINES=$(git diff origin/${{ github.base_ref }}...HEAD | wc -l | tr -d ' ')
          echo "변경 라인 수: $DIFF_LINES"

          if [ "$DIFF_LINES" -gt 1000 ]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PR 변경사항이 1000줄을 초과합니다 ($DIFF_LINES줄). AI 리뷰를 스킵합니다."
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

  ai-review:
    runs-on: ubuntu-latest
    needs: check-label
    if: needs.check-label.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          show_full_output: false
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR의 변경사항을 아래 기준에 따라 코드 리뷰해줘.
            각 지적 사항은 심각도를 분류하고 구체적인 수정 방향을 제시해.

            리뷰 결과는 반드시 GitHub PR 댓글로 게시해.
            - 전체 리뷰 요약은 `gh pr comment`로 최상위 PR 댓글에 작성해.
            - 특정 코드 라인에 대한 지적은 `mcp__github_inline_comment__create_inline_comment`를 사용하고, 실제 게시할 코멘트에는 `confirmed: true`를 지정해.
            - 리뷰 내용을 일반 메시지로만 출력하고 끝내지 마.

            ## 프로젝트 컨벤션 (AGENTS.md 기반)

            **DTO 규칙**
            - Request DTO: `record` 사용, 이름은 `XxxRequestDto`
            - Response DTO: `record` 사용, 이름은 `XxxResponseDto`
            - `from(Entity)` 메서드 불필요 — 서비스에서 직접 생성하는 패턴
            - Validation 어노테이션은 반드시 별도 줄에 배치 (한 줄 몰아쓰기 금지)

            **예외 처리**
            - `IllegalArgumentException`, `RuntimeException` 직접 throw 금지
            - 예외 계층: `DomainException` (abstract) → `XxxException extends DomainException` → `XxxErrorType` (enum, `ErrorCode` 구현)
            - `throw new XxxException(XxxErrorType.XXX)` 패턴 사용
            - `GlobalExceptionHandler`에 새 예외 타입 추가 불필요 (`DomainException` 핸들러가 자동 처리)

            **공통 응답 구조**
            - 컨트롤러 반환: `ResponseEntity<ApiResult<T>>`
            - 반환 생성: `ApiResponse.of(SuccessType.XXX, data)`
            - Swagger import 충돌: `com.example.cowmjucraft.global.response.ApiResponse`는 import, `io.swagger.v3.oas.annotations.responses.ApiResponse`는 FQN 사용

            **Entity 규칙**
            - setter 추가 금지, 상태 변경은 의미 있는 메서드로
            - `@NoArgsConstructor(access = AccessLevel.PROTECTED)` 필수
            - 신규 Entity는 `BaseTimeEntity` 상속 필수
            - `@Enumerated(EnumType.STRING)` 사용

            **Service 규칙**
            - `@Service` + `@RequiredArgsConstructor`
            - 쓰기 메서드: `@Transactional` 개별 적용
            - 읽기 메서드: `@Transactional(readOnly = true)` 개별 적용
            - 의존성 주입: 생성자 주입만 허용

            **Controller 규칙**
            - Swagger 문서는 `*ControllerDocs` 인터페이스로 분리, Controller가 `implements`
            - admin API 경로: `/api/admin/...`, 사용자 API 경로: `/api/...`
            - admin/client 컨트롤러는 `controller/admin/`, `controller/client/` 별도 패키지

            **S3 규칙**
            - S3 직접 조작 금지 — `S3PresignFacade` 또는 `S3ObjectService` 경유

            **도메인 경계**
            - Entity가 Controller 레이어까지 노출되면 안 됨
            - 도메인 간 직접 의존 최소화 (연관은 ID 참조 또는 Repository 경유)

            ## 리뷰 중점 항목

            1. **컨벤션 위반**: 위 규칙 위반 여부
            2. **N+1 쿼리**: 반복문 내 repository 호출, fetch join 누락
            3. **트랜잭션 경계**: 여러 저장소 작업이 하나의 트랜잭션 내에 있는지, S3 작업이 트랜잭션 내에 혼재하는지
            4. **보안**: 인가 설정 누락, 민감정보 노출, SecurityConfig·JwtAuthenticationFilter·JwtTokenProvider 변경 여부
            5. **테스트 누락**: 핵심 비즈니스 로직에 테스트가 없는 경우
            6. **명백한 버그**: NPE 가능성, 잘못된 조건문, 논리 오류

            ## 심각도 분류

            - 🔴 Critical: 보안 취약점, 데이터 손실 가능성, 명백한 버그 — 반드시 수정 필요
            - 🟡 Warning: 컨벤션 위반, N+1, 트랜잭션 경계 문제 — 수정 강력 권고
            - 🟢 Suggestion: 가독성, 성능 개선 여지 — 선택적 반영

            ## 출력 형식

            각 지적 사항은 다음 형식으로 작성:
            ```
            심각도 | 파일명:라인번호 | 문제 설명
            수정 방향: ...
            ```

            리뷰 마지막에 전체 요약을 작성:
            - 🔴 Critical: N건
            - 🟡 Warning: N건
            - 🟢 Suggestion: N건
            - 총평: 한 문장

  skip-notice:
    runs-on: ubuntu-latest
    needs: check-label
    if: needs.check-label.outputs.should-run == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: 스킵 안내 코멘트 작성
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ PR 변경사항이 1000줄을 초과하여 AI 리뷰를 스킵했습니다.\n\nPR을 더 작은 단위로 분리하거나 수동 리뷰를 진행해 주세요.'
            })
